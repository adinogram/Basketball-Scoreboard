<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Basketball Scoreboard</title>
  </head>
  <body>
    <div class="container">
      <div class="side">
        <h1>HOME</h1>
        <div class="main-score">
            <h1  id="home-score">0</h1>
        </div>
        <div class="mini-score">
            <button class="btn" onclick="addOneH()">+1</button>
            <button class="btn" onclick="addTwoH()">+2</button>
            <button class="btn" onclick="addThreeH()">+3</button>
        </div> 
      </div>
      <div class="side">
        <h1>AWAY</h1>
                <div class="main-score">
                    <h1 id="away-score">0</h1>
                </div>
        <div class="mini-score">
            <button class="btn" onclick="addOne()">+1</button>
            <button class="btn" onclick="addTwo()">+2</button>
            <button class="btn" onclick="addThree()">+3</button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
